<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="#232F3E"/>
  
  <!-- Calculator body -->
  <rect x="28" y="20" width="72" height="92" rx="8" ry="8" fill="#FF9900"/>
  
  <!-- Screen -->
  <rect x="36" y="28" width="56" height="24" rx="4" ry="4" fill="#1a1a2e"/>
  
  <!-- Dollar sign on screen -->
  <text x="64" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00ff88" text-anchor="middle">$$$</text>
  
  <!-- Calculator buttons row 1 -->
  <rect x="36" y="60" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="52" y="60" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="68" y="60" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="84" y="60" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  
  <!-- Calculator buttons row 2 -->
  <rect x="36" y="76" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="52" y="76" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="68" y="76" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="84" y="76" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  
  <!-- Calculator buttons row 3 -->
  <rect x="36" y="92" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="52" y="92" width="12" height="12" rx="2" ry="2" fill="#232F3E"/>
  <rect x="68" y="92" width="28" height="12" rx="2" ry="2" fill="#146EB4"/>
  
  <!-- AWS smile arrow beneath calculator -->
  <path d="M 40 108 Q 64 118 88 108" stroke="#FF9900" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 83 104 L 88 108 L 83 112" stroke="#FF9900" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
